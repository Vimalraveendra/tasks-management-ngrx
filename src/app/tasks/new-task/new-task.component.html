<h2>Add Task</h2>
<form (ngSubmit)="onSubmit()" [formGroup]="form">
    <p>
        <label for="title">Title</label>
        <input type="text" id="title" name="title" formControlName="enteredTitle" />
    </p>

    <p>
        <label for="summary">Summary</label>
        <textarea id="summary" rows="5" name="summary" formControlName="enteredSummary"></textarea>
    </p>

    <p>
        <label for="due-date">Due Date</label>
        <input type="date" id="due-date" name="due-date" formControlName="enteredDate" />
    </p>

    <p class="actions">
        <!-- /users/u1/tasks/new ==> /users/u1/tasks -->
        <a routerLink="../">Cancel</a>
        <button type="submit">Create</button>
    </p>
    @if(errorData()){
    <p>Please enter a valid data to input fields.</p>
    }
</form>
